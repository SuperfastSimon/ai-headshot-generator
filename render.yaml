services:
  - type: web
    name: ai-headshot-generator
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: NANO_BANANA_API_KEY
        sync: false
      - key: BASE_URL
        sync: false
